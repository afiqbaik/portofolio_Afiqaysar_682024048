<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/palette.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-badge">AF</div><span style="font-weight:700;">Afiq Admin</span></div>
        <nav>
          <a class="nav-item" href="./dashboard.html"><i class="fa-solid fa-table-columns"></i><span>Dashboard</span></a>
          <a class="nav-item" href="./profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
          <a class="nav-item" href="./experience.html"><i class="fa-solid fa-briefcase"></i><span>Experience</span></a>
          <a class="nav-item active" href="./projects.html"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
          <a class="nav-item" href="./skills.html"><i class="fa-solid fa-star"></i><span>Skills</span></a>
        </nav>
      </aside>
      <div class="main">
        <header class="header"><div class="title-group"><h1>Projects</h1><p>Manage portfolio projects</p></div><div class="header-actions"><div class="avatar-chip"><i class="fa-solid fa-user"></i><span id="userName">Admin</span></div><button class="btn btn-secondary" id="logoutBtn">Logout</button></div></header>
        <main class="content"><div class="card"><div class="card-title"><h3>Project Entries</h3><button class="btn btn-primary" id="openCreateBtn">+ New Project</button></div><div id="projectList"></div></div></main>
      </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <div class="modal-header"><h3 id="modalTitle">New Project</h3><button class="btn btn-secondary" id="closeModalBtn">Close</button></div>
        <form id="projectForm">
          <input id="projectId" type="hidden" />
          <div class="grid grid-2">
            <div class="form-group"><label class="label">Title</label><input class="input" id="judul" required /></div>
            <div class="form-group"><label class="label">Image URL</label><input class="input" id="gambar_url" /></div>
            <div class="form-group"><label class="label">Demo Link</label><input class="input" id="link_project" /></div>
            <div class="form-group"><label class="label">GitHub URL</label><input class="input" id="github_url" /></div>
          </div>
          <div class="form-group"><label class="label">Description</label><textarea class="textarea" id="deskripsi" style="min-height:110px"></textarea></div>
          <div class="modal-actions"><button class="btn btn-secondary" type="button" id="cancelFormBtn">Cancel</button><button class="btn btn-primary" type="submit" id="saveBtn">Save</button></div>
        </form>
      </div>
    </div>

    <div class="modal-backdrop" id="deleteBackdrop">
      <div class="modal">
        <div class="modal-header"><h3>Delete Project</h3><button class="btn btn-secondary" id="closeDeleteBtn">Close</button></div>
        <p>Are you sure you want to delete this project?</p>
        <div class="modal-actions"><button class="btn btn-secondary" type="button" id="cancelDeleteBtn">Cancel</button><button class="btn btn-danger" type="button" id="confirmDeleteBtn">Delete</button></div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="./js/api.js"></script>
    <script>
      const userName = document.getElementById('userName');
      let projectState = { items: [], selectedId: null };
      const modalBackdrop = document.getElementById('modalBackdrop');
      const deleteBackdrop = document.getElementById('deleteBackdrop');

      function showToast(message) { const toast = document.getElementById('toast'); toast.textContent = message; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2400); }
      function closeModal() { modalBackdrop.classList.remove('open'); document.getElementById('projectForm').reset(); document.getElementById('projectId').value = ''; projectState.selectedId = null; }
      function openModal(item) { document.getElementById('modalTitle').textContent = item ? 'Edit Project' : 'New Project'; if (item) { document.getElementById('projectId').value = item.id; document.getElementById('judul').value = item.judul || ''; document.getElementById('deskripsi').value = item.deskripsi || ''; document.getElementById('gambar_url').value = item.gambar_url || ''; document.getElementById('link_project').value = item.link_project || ''; document.getElementById('github_url').value = item.github_url || ''; } modalBackdrop.classList.add('open'); }
      function closeDelete() { deleteBackdrop.classList.remove('open'); projectState.selectedId = null; }
      function openDelete(id) { projectState.selectedId = id; deleteBackdrop.classList.add('open'); }

      async function ensureAuth() { const token = sessionStorage.getItem('token'); if (!token) { window.location.href = './login.html'; return false; } try { const auth = await checkAuth(); if (!auth.authenticated) throw new Error('Session invalid'); const storedUser = JSON.parse(sessionStorage.getItem('user') || '{}'); userName.textContent = storedUser.username || 'Admin'; return true; } catch { window.location.href = './login.html'; return false; } }

      function renderProjects(items) { projectState.items = items; const container = document.getElementById('projectList'); if (!items.length) { container.innerHTML = '<div class="empty-state">No projects yet.</div>'; return; } container.innerHTML = '<table class="table"><thead><tr><th>Title</th><th></th></tr></thead><tbody>' + items.map(item => `<tr><td>${item.judul||'—'}</td><td><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" type="button" onclick="window.editProject(${item.id})">Edit</button><button class="btn btn-danger" type="button" onclick="window.deleteProject(${item.id})">Delete</button></div></td></tr>`).join('') + '</tbody></table>'; }

      window.editProject = (id) => { const item = projectState.items.find(x => x.id === id); openModal(item); };
      window.deleteProject = (id) => { projectState.selectedId = id; openDelete(id); };

      async function loadData() { if (!(await ensureAuth())) return; try { const res = await loadProjects(); renderProjects(res.data || []); } catch (e) { showToast(e.message); } }

      document.getElementById('openCreateBtn').addEventListener('click', () => openModal(null));
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('closeDeleteBtn').addEventListener('click', closeDelete);
      document.getElementById('cancelDeleteBtn').addEventListener('click', closeDelete);
      document.getElementById('confirmDeleteBtn').addEventListener('click', async () => { const id = projectState.selectedId; if (!id) return; try { await deleteProject(id); showToast('Project deleted'); closeDelete(); await loadData(); } catch (error) { showToast(error.message); } });

      document.getElementById('projectForm').addEventListener('submit', async (event) => { event.preventDefault(); const saveBtn = document.getElementById('saveBtn'); const payload = { judul: document.getElementById('judul').value, deskripsi: document.getElementById('deskripsi').value, gambar_url: document.getElementById('gambar_url').value, link_project: document.getElementById('link_project').value, github_url: document.getElementById('github_url').value }; saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; try { const id = document.getElementById('projectId').value; if (id) { await updateProject(id, payload); } else { await saveProject(payload); } showToast('Project saved'); closeModal(); await loadData(); } catch (error) { showToast(error.message); } finally { saveBtn.disabled = false; saveBtn.textContent = 'Save'; } });

      document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
      document.getElementById('logoutBtn').addEventListener('click', async () => { try { await logout(); } catch { } sessionStorage.clear(); window.location.href = './login.html'; });
      loadData();
    </script>
  </body>
</html>
