<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experience | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/palette.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="sidebar"> <div class="brand"><div class="brand-badge">AF</div><span style="font-weight:700;">Afiq Admin</span></div><nav><a class="nav-item" href="./dashboard.html"><i class="fa-solid fa-table-columns"></i><span>Dashboard</span></a><a class="nav-item" href="./profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a><a class="nav-item active" href="./experience.html"><i class="fa-solid fa-briefcase"></i><span>Experience</span></a><a class="nav-item" href="./projects.html"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a><a class="nav-item" href="./skills.html"><i class="fa-solid fa-star"></i><span>Skills</span></a></nav></aside>
      <div class="main">
        <header class="header"><div class="title-group"><h1>Experience</h1><p>Manage professional experience entries</p></div><div class="header-actions"><div class="avatar-chip"><i class="fa-solid fa-user"></i><span id="userName">Admin</span></div><button class="btn btn-secondary" id="logoutBtn">Logout</button></div></header>
        <main class="content">
          <div class="card"><div class="card-title"><h3>Experience Entries</h3><button class="btn btn-primary" id="openCreateBtn">+ New Experience</button></div><div id="experienceList"></div></div>
        </main>
      </div>
    </div>
    <div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal-header"><h3 id="modalTitle">New Experience</h3><button class="btn btn-secondary" id="closeModalBtn">Close</button></div><form id="experienceForm"><input id="experienceId" type="hidden" /><div class="form-group"><label class="label">Position</label><input class="input" id="posisi" required /></div><div class="form-group"><label class="label">Company</label><input class="input" id="perusahaan" required /></div><div class="form-group"><label class="label">Duration</label><input class="input" id="durasi" required /></div><div class="form-group"><label class="label">Description</label><textarea class="textarea" id="deskripsi" style="min-height:110px"></textarea></div><div class="modal-actions"><button class="btn btn-secondary" type="button" id="cancelFormBtn">Cancel</button><button class="btn btn-primary" type="submit" id="saveBtn">Save</button></div></form></div></div>
    <div class="modal-backdrop" id="deleteBackdrop"><div class="modal"><div class="modal-header"><h3>Delete Experience</h3><button class="btn btn-secondary" id="closeDeleteBtn">Close</button></div><p id="deleteMessage">Are you sure you want to delete this experience?</p><div class="modal-actions"><button class="btn btn-secondary" type="button" id="cancelDeleteBtn">Cancel</button><button class="btn btn-danger" type="button" id="confirmDeleteBtn">Delete</button></div></div></div>
    <div id="toast" class="toast"></div>
    <script src="./js/api.js"></script>
    <script>
      const userName=document.getElementById('userName'); let experienceState={items:[], selectedId:null}; const modalBackdrop=document.getElementById('modalBackdrop'); const deleteBackdrop=document.getElementById('deleteBackdrop'); function showToast(message){ const toast=document.getElementById('toast'); toast.textContent=message; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2400);} function closeModal(){modalBackdrop.classList.remove('open'); document.getElementById('experienceForm').reset(); document.getElementById('experienceId').value=''; experienceState.selectedId=null;} function openModal(item){ document.getElementById('modalTitle').textContent=item? 'Edit Experience':'New Experience'; if(item){ document.getElementById('experienceId').value=item.id; document.getElementById('posisi').value=item.posisi||''; document.getElementById('perusahaan').value=item.perusahaan||''; document.getElementById('durasi').value=item.durasi||''; document.getElementById('deskripsi').value=item.deskripsi||''; } modalBackdrop.classList.add('open'); } function closeDelete(){deleteBackdrop.classList.remove('open'); experienceState.selectedId=null;} function openDelete(id){experienceState.selectedId=id; deleteBackdrop.classList.add('open');} async function ensureAuth(){ const token=sessionStorage.getItem('token'); if(!token){window.location.href='./login.html'; return false;} try{ const auth=await checkAuth(); if(!auth.authenticated) throw new Error('Session invalid'); const storedUser=JSON.parse(sessionStorage.getItem('user')||'{}'); userName.textContent=storedUser.username||'Admin'; return true;} catch{window.location.href='./login.html'; return false;}} function renderExperiences(items){ experienceState.items=items; const container=document.getElementById('experienceList'); if(!items.length){ container.innerHTML='<div class="empty-state">No experience entries yet.</div>'; return; } container.innerHTML='<table class="table"><thead><tr><th>Position</th><th>Company</th><th>Duration</th><th></th></tr></thead><tbody>' + items.map(item=>`<tr><td>${item.posisi||'—'}</td><td>${item.perusahaan||'—'}</td><td>${item.durasi||'—'}</td><td><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" type="button" onclick="window.editExperience(${item.id})">Edit</button><button class="btn btn-danger" type="button" onclick="window.deleteExperience(${item.id})">Delete</button></div></td></tr>`).join('') + '</tbody></table>'; } window.editExperience=(id)=>{ const item=experienceState.items.find(x=>x.id===id); openModal(item); }; window.deleteExperience=(id)=>{ experienceState.selectedId=id; openDelete(id); }; async function loadData(){ try { const data=await loadExperiences(); renderExperiences(data.data||[]);} catch(error){ document.getElementById('experienceList').innerHTML='<div class="error-state">'+error.message+'</div>'; }} document.getElementById('openCreateBtn').addEventListener('click',()=>openModal(null)); document.getElementById('closeModalBtn').addEventListener('click',closeModal); document.getElementById('cancelFormBtn').addEventListener('click',closeModal); document.getElementById('closeDeleteBtn').addEventListener('click',closeDelete); document.getElementById('cancelDeleteBtn').addEventListener('click',closeDelete); document.getElementById('confirmDeleteBtn').addEventListener('click', async()=>{ const id=experienceState.selectedId; if(!id) return; try { await deleteExperience(id); showToast('Experience deleted'); closeDelete(); await loadData(); } catch(error){ showToast(error.message); }}); document.getElementById('experienceForm').addEventListener('submit', async(event)=>{ event.preventDefault(); const saveBtn=document.getElementById('saveBtn'); const payload={ posisi:document.getElementById('posisi').value, perusahaan:document.getElementById('perusahaan').value, durasi:document.getElementById('durasi').value, deskripsi:document.getElementById('deskripsi').value }; saveBtn.disabled=true; saveBtn.textContent='Saving...'; try { const id=document.getElementById('experienceId').value; if(id){ await updateExperience(id,payload); } else { await saveExperience(payload); } showToast('Experience saved'); closeModal(); await loadData(); } catch(error){ showToast(error.message); } finally { saveBtn.disabled=false; saveBtn.textContent='Save'; } }); document.getElementById('logoutBtn').addEventListener('click', async()=>{try{await logout();}catch{}sessionStorage.clear();window.location.href='./login.html';}); window.addEventListener('keydown',(event)=>{ if(event.key==='Escape'){ closeModal(); closeDelete(); } }); modalBackdrop.addEventListener('click',(event)=>{ if(event.target===modalBackdrop) closeModal(); }); deleteBackdrop.addEventListener('click',(event)=>{ if(event.target===deleteBackdrop) closeDelete(); }); (async()=>{ const ok=await ensureAuth(); if(ok) await loadData(); })(); </script></body></html>
