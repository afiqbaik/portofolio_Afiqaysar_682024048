<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/palette.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-badge">AF</div><span style="font-weight:700;">Afiq Admin</span></div>
        <nav>
          <a class="nav-item" href="./dashboard.html"><i class="fa-solid fa-table-columns"></i><span>Dashboard</span></a>
          <a class="nav-item" href="./profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
          <a class="nav-item" href="./experience.html"><i class="fa-solid fa-briefcase"></i><span>Experience</span></a>
          <a class="nav-item" href="./projects.html"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
          <a class="nav-item active" href="./skills.html"><i class="fa-solid fa-star"></i><span>Skills</span></a>
        </nav>
      </aside>
      <div class="main">
        <header class="header">
          <div class="title-group"><h1>Skills</h1><p>Manage the skills shown on the site</p></div>
          <div class="header-actions"><div class="avatar-chip"><i class="fa-solid fa-user"></i><span id="userName">Admin</span></div><button class="btn btn-secondary" id="logoutBtn">Logout</button></div>
        </header>
        <main class="content">
          <div class="card">
            <div class="card-title"><h3>Skill Entries</h3><button class="btn btn-primary" id="openCreateBtn">+ New Skill</button></div>
            <div id="skillList"></div>
          </div>
        </main>
      </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <div class="modal-header"><h3 id="modalTitle">New Skill</h3><button class="btn btn-secondary" id="closeModalBtn">Close</button></div>
        <form id="skillForm">
          <input id="skillId" type="hidden" />
          <div class="grid grid-2">
            <div class="form-group"><label class="label">Skill Name</label><input class="input" id="nama_skill" required /></div>
            <div class="form-group"><label class="label">Icon Class</label><input class="input" id="icon_class" placeholder="e.g. fa-brands fa-python" /></div>
          </div>
          <div class="modal-actions"><button class="btn btn-secondary" type="button" id="cancelFormBtn">Cancel</button><button class="btn btn-primary" type="submit" id="saveBtn">Save</button></div>
        </form>
      </div>
    </div>

    <div class="modal-backdrop" id="deleteBackdrop">
      <div class="modal">
        <div class="modal-header"><h3>Delete Skill</h3><button class="btn btn-secondary" id="closeDeleteBtn">Close</button></div>
        <p>Are you sure you want to delete this skill?</p>
        <div class="modal-actions"><button class="btn btn-secondary" type="button" id="cancelDeleteBtn">Cancel</button><button class="btn btn-danger" type="button" id="confirmDeleteBtn">Delete</button></div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="./js/api.js"></script>
    <script>
      // Skills admin (ERD-aligned): only nama_skill and icon_class
      const userName = document.getElementById('userName');
      const modalBackdrop = document.getElementById('modalBackdrop');
      const deleteBackdrop = document.getElementById('deleteBackdrop');
      let skillState = { items: [], selectedId: null };

      function showToast(message) { const toast = document.getElementById('toast'); toast.textContent = message; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2400); }
      function closeModal() { modalBackdrop.classList.remove('open'); document.getElementById('skillForm').reset(); document.getElementById('skillId').value = ''; }
      function openModal(item) { document.getElementById('modalTitle').textContent = item ? 'Edit Skill' : 'New Skill'; if (item) { document.getElementById('skillId').value = item.id; document.getElementById('nama_skill').value = item.nama_skill || ''; document.getElementById('icon_class').value = item.icon_class || ''; } modalBackdrop.classList.add('open'); }
      function closeDelete() { deleteBackdrop.classList.remove('open'); skillState.selectedId = null; }
      function openDelete(id) { skillState.selectedId = id; deleteBackdrop.classList.add('open'); }

      async function ensureAuth() { const token = sessionStorage.getItem('token'); if (!token) { window.location.href = './login.html'; return false; } try { const auth = await checkAuth(); if (!auth.authenticated) throw new Error('Session invalid'); const storedUser = JSON.parse(sessionStorage.getItem('user') || '{}'); userName.textContent = storedUser.username || 'Admin'; return true; } catch { window.location.href = './login.html'; return false; } }

      function renderSkills(items) { skillState.items = items; const container = document.getElementById('skillList'); if (!items.length) { container.innerHTML = '<div class="empty-state">No skills yet.</div>'; return; } container.innerHTML = '<table class="table"><thead><tr><th>Name</th><th>Icon</th><th></th></tr></thead><tbody>' + items.map(item => `<tr><td>${item.nama_skill||'—'}</td><td>${item.icon_class ? '<i class="' + item.icon_class + '"></i> ' + item.icon_class : '—'}</td><td><div style="display:flex;gap:8px;justify-content:flex-end"><button class="btn btn-secondary" type="button" onclick="window.editSkill(${item.id})">Edit</button><button class="btn btn-danger" type="button" onclick="window.deleteSkill(${item.id})">Delete</button></div></td></tr>`).join('') + '</tbody></table>'; }

      window.editSkill = (id) => { const item = skillState.items.find(x => x.id === id); openModal(item); };
      window.deleteSkill = (id) => { skillState.selectedId = id; openDelete(id); };

      async function loadData() { if (!(await ensureAuth())) return; try { const res = await loadSkills(); renderSkills(res.data || []); } catch (e) { showToast(e.message); } }

      document.getElementById('openCreateBtn').addEventListener('click', () => openModal(null));
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('closeDeleteBtn').addEventListener('click', closeDelete);
      document.getElementById('cancelDeleteBtn').addEventListener('click', closeDelete);
      document.getElementById('confirmDeleteBtn').addEventListener('click', async () => { const id = skillState.selectedId; if (!id) return; try { await deleteSkill(id); showToast('Skill deleted'); closeDelete(); await loadData(); } catch (error) { showToast(error.message); } });

      document.getElementById('skillForm').addEventListener('submit', async (event) => { event.preventDefault(); const saveBtn = document.getElementById('saveBtn'); const payload = { nama_skill: document.getElementById('nama_skill').value, icon_class: document.getElementById('icon_class').value }; saveBtn.disabled = true; saveBtn.textContent = 'Saving...'; try { const id = document.getElementById('skillId').value; if (id) { await updateSkill(id, payload); } else { await saveSkill(payload); } showToast('Skill saved'); closeModal(); await loadData(); } catch (error) { showToast(error.message); } finally { saveBtn.disabled = false; saveBtn.textContent = 'Save'; } });

      document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
      document.getElementById('logoutBtn').addEventListener('click', async () => { try { await logout(); } catch { } sessionStorage.clear(); window.location.href = './login.html'; });
      loadData();
    </script>
  </body>
</html>
