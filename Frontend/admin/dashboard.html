<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/palette.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge">AF</div>
          <span style="font-weight:700;">Afiq Admin</span>
        </div>
        <nav>
          <a class="nav-item active" href="./dashboard.html"><i class="fa-solid fa-table-columns"></i><span>Dashboard</span></a>
          <a class="nav-item" href="./profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
          <a class="nav-item" href="./experience.html"><i class="fa-solid fa-briefcase"></i><span>Experience</span></a>
          <a class="nav-item" href="./projects.html"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
          <a class="nav-item" href="./skills.html"><i class="fa-solid fa-star"></i><span>Skills</span></a>
        </nav>
      </aside>
      <div class="main">
        <header class="header">
          <div class="title-group">
            <h1>Dashboard</h1>
            <p>Overview of your portfolio content</p>
          </div>
          <div class="header-actions">
            <div class="avatar-chip"><i class="fa-solid fa-user"></i><span id="userName">Admin</span></div>
            <button class="btn btn-secondary" id="logoutBtn">Logout</button>
          </div>
        </header>
        <main class="content">
          <div class="grid grid-3" id="statsGrid"></div>
          <div class="grid grid-2" style="margin-top:20px;">
            <div class="card">
              <div class="card-title"><h3>Recent Activity</h3><span class="badge">Live</span></div>
              <div id="recentActivity"></div>
            </div>
            <div class="card">
              <div class="card-title"><h3>Quick Summary</h3></div>
              <div id="summaryPanel"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="./js/api.js"></script>
    <script>
      const statsGrid = document.getElementById('statsGrid');
      const recentActivity = document.getElementById('recentActivity');
      const summaryPanel = document.getElementById('summaryPanel');
      const userName = document.getElementById('userName');
      function showToast(message){ const toast=document.getElementById('toast'); toast.textContent=message; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2400);} 
      async function ensureAuth() {
        const token = sessionStorage.getItem('token');
        if (!token) { window.location.href = './login.html'; return false; }
        try { const auth = await checkAuth(); if (!auth.authenticated) throw new Error('Session invalid'); const storedUser = JSON.parse(sessionStorage.getItem('user') || '{}'); userName.textContent = storedUser.username || 'Admin'; return true; } catch (error) { window.location.href = './login.html'; return false; }
      }
      function renderSkeleton(target, count = 3) { target.innerHTML = '<div class="skeleton">' + Array.from({length:count},()=>'<div class="line"></div>').join('') + '</div>'; }
      function renderStats(data) { statsGrid.innerHTML = [`<div class="card metric"><div class="value">${data.experiences_count ?? 0}</div><div class="label">Experiences</div></div>`,`<div class="card metric"><div class="value">${data.projects_count ?? 0}</div><div class="label">Projects</div></div>`,`<div class="card metric"><div class="value">${data.skills_count ?? 0}</div><div class="label">Skills</div></div>`].join(''); }
      function renderRecent(items) { if (!items?.length) { recentActivity.innerHTML = '<div class="empty-state">No recent activity yet.</div>'; return; } recentActivity.innerHTML = '<div class="table-card"><table class="table">' + items.map(item=>`<tr><td>${item.posisi || item.judul || 'Entry'}</td><td>${item.perusahaan || item.deskripsi || '—'}</td><td>${new Date(item.created_at).toLocaleDateString()}</td></tr>`).join('') + '</table></div>'; }
      function renderSummary(data) { summaryPanel.innerHTML = `<div class="empty-state">Welcome back, <strong>${data.admin_name || 'Admin'}</strong>. Keep your portfolio content fresh and polished.</div>`; }
      async function init() {
        const ok = await ensureAuth(); if (!ok) return;
        renderSkeleton(statsGrid, 3); renderSkeleton(recentActivity, 3); renderSkeleton(summaryPanel, 2);
        try { const stats = await loadDashboardStats(); const recent = await loadRecentActivity(); renderStats(stats.data || {}); renderRecent(recent.data || []); renderSummary(stats.data || {}); } catch (error) { recentActivity.innerHTML = '<div class="error-state">' + error.message + '</div>'; summaryPanel.innerHTML = '<div class="error-state">Unable to load dashboard.</div>'; }
      }
      document.getElementById('logoutBtn').addEventListener('click', async () => { try { await logout(); } catch (e) {} sessionStorage.clear(); window.location.href='./login.html'; });
      init();
    </script>
  </body>
</html>
